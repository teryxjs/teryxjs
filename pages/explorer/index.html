<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teryx Explorer</title>
  <link rel="stylesheet" href="../teryx.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f8fafc; }

    /* ── Sidebar ── */
    .ex-sidebar { width: 260px; min-width: 260px; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
    .ex-sidebar-header { padding: 1rem 1.25rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 0.75rem; }
    .ex-sidebar-header h1 { margin: 0; font-size: 1.125rem; font-weight: 700; color: #0f172a; }
    .ex-sidebar-header a { font-size: 0.75rem; color: #64748b; text-decoration: none; margin-left: auto; }
    .ex-sidebar-header a:hover { color: #0f172a; }
    .ex-search { padding: 0.75rem 1.25rem; border-bottom: 1px solid #e2e8f0; }
    .ex-search input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.8125rem; outline: none; background: #f8fafc; }
    .ex-search input:focus { border-color: var(--tx-primary, #3b82f6); }
    .ex-nav { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .ex-nav-group { margin-bottom: 0.25rem; }
    .ex-nav-group-title { padding: 0.5rem 1.25rem 0.25rem; font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    .ex-nav-item { display: block; padding: 0.4rem 1.25rem 0.4rem 1.75rem; font-size: 0.8125rem; color: #475569; text-decoration: none; cursor: pointer; border-left: 3px solid transparent; }
    .ex-nav-item:hover { background: #f1f5f9; color: #0f172a; }
    .ex-nav-item.active { background: #eff6ff; color: #2563eb; border-left-color: #2563eb; font-weight: 500; }
    .ex-nav-item.hidden { display: none; }

    /* ── Main content ── */
    .ex-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ex-toolbar { padding: 0.75rem 1.5rem; border-bottom: 1px solid #e2e8f0; background: #fff; display: flex; align-items: center; gap: 1rem; min-height: 52px; }
    .ex-breadcrumb { font-size: 0.8125rem; color: #64748b; }
    .ex-breadcrumb span { color: #0f172a; font-weight: 500; }
    .ex-toolbar-actions { margin-left: auto; display: flex; gap: 0.5rem; }
    .ex-toolbar-btn { padding: 0.375rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; font-size: 0.75rem; cursor: pointer; color: #475569; }
    .ex-toolbar-btn:hover { background: #f1f5f9; }
    .ex-toolbar-btn.active { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .ex-content { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* ── Demo containers ── */
    .ex-demo { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 1.5rem; }
    .ex-demo-header { padding: 0.75rem 1rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; }
    .ex-demo-header h3 { margin: 0; font-size: 0.875rem; font-weight: 600; color: #334155; }
    .ex-demo-body { padding: 1.25rem; }
    .ex-demo-source { border-top: 1px solid #e2e8f0; background: #f8fafc; }
    .ex-demo-source pre { margin: 0; padding: 1rem; font-size: 0.75rem; overflow-x: auto; color: #334155; line-height: 1.6; }
    .ex-demo-source-toggle { padding: 0.5rem 1rem; font-size: 0.75rem; color: #64748b; cursor: pointer; border-top: 1px solid #e2e8f0; background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; text-align: left; }
    .ex-demo-source-toggle:hover { color: #0f172a; background: #f1f5f9; }

    /* ── Welcome page ── */
    .ex-welcome { max-width: 640px; margin: 3rem auto; text-align: center; }
    .ex-welcome h2 { font-size: 1.75rem; font-weight: 700; color: #0f172a; margin: 0 0 0.75rem; }
    .ex-welcome p { color: #64748b; line-height: 1.6; margin: 0 0 1.5rem; }
    .ex-welcome-stats { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
    .ex-welcome-stat { text-align: center; }
    .ex-welcome-stat strong { display: block; font-size: 1.5rem; color: #0f172a; }
    .ex-welcome-stat span { font-size: 0.8125rem; color: #94a3b8; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="ex-sidebar">
  <div class="ex-sidebar-header">
    <h1>Teryx Explorer</h1>
    <a href="../">Home</a>
  </div>
  <div class="ex-search">
    <input type="text" id="search" placeholder="Search widgets..." autocomplete="off">
  </div>
  <nav class="ex-nav" id="nav"></nav>
</aside>

<!-- Main -->
<main class="ex-main">
  <div class="ex-toolbar" id="toolbar">
    <div class="ex-breadcrumb" id="breadcrumb">Explorer</div>
    <div class="ex-toolbar-actions">
      <button class="ex-toolbar-btn" id="btn-source" title="Toggle source code">Source</button>
    </div>
  </div>
  <div class="ex-content" id="content"></div>
</main>

<script src="../xhtmlx.js"></script>
<script src="../teryx.js"></script>
<script>
(function () {
  'use strict';

  // ── Widget registry ──
  // Each entry: { category, title, render(container) }
  var demos = [];
  var categories = {};

  window.ExplorerRegistry = {
    add: function (category, title, renderFn) {
      var id = slugify(category + '-' + title);
      var demo = { id: id, category: category, title: title, render: renderFn };
      demos.push(demo);
      if (!categories[category]) categories[category] = [];
      categories[category].push(demo);
    }
  };

  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Navigation ──
  var navEl = document.getElementById('nav');
  var contentEl = document.getElementById('content');
  var breadcrumbEl = document.getElementById('breadcrumb');
  var searchEl = document.getElementById('search');
  var btnSource = document.getElementById('btn-source');
  var showSource = false;

  function buildNav() {
    var html = '';
    var order = [
      'Data Display', 'Navigation', 'Feedback', 'Data Entry',
      'Layout', 'Specialized', 'Utilities'
    ];
    order.forEach(function (cat) {
      var items = categories[cat];
      if (!items || items.length === 0) return;
      html += '<div class="ex-nav-group">';
      html += '<div class="ex-nav-group-title">' + escHtml(cat) + '</div>';
      items.forEach(function (d) {
        html += '<a class="ex-nav-item" data-id="' + d.id + '" href="#' + d.id + '">' + escHtml(d.title) + '</a>';
      });
      html += '</div>';
    });
    navEl.innerHTML = html;
  }

  function navigate(id) {
    var demo = demos.find(function (d) { return d.id === id; });

    // Update active nav
    navEl.querySelectorAll('.ex-nav-item').forEach(function (el) {
      el.classList.toggle('active', el.getAttribute('data-id') === id);
    });

    if (!demo) {
      showWelcome();
      return;
    }

    breadcrumbEl.innerHTML = escHtml(demo.category) + ' &rsaquo; <span>' + escHtml(demo.title) + '</span>';
    contentEl.innerHTML = '';
    demo.render(contentEl);

    // Apply source visibility
    contentEl.querySelectorAll('.ex-demo-source').forEach(function (el) {
      el.style.display = showSource ? '' : 'none';
    });
  }

  function showWelcome() {
    breadcrumbEl.textContent = 'Explorer';
    contentEl.innerHTML =
      '<div class="ex-welcome">' +
      '<h2>Teryx Explorer</h2>' +
      '<p>Interactive demos for every Teryx widget. Pick a component from the sidebar to see it in action with live examples and source code.</p>' +
      '<div class="ex-welcome-stats">' +
      '<div class="ex-welcome-stat"><strong>' + demos.length + '</strong><span>Demos</span></div>' +
      '<div class="ex-welcome-stat"><strong>' + Object.keys(categories).length + '</strong><span>Categories</span></div>' +
      '<div class="ex-welcome-stat"><strong>0</strong><span>Dependencies</span></div>' +
      '</div></div>';
  }

  // ── Search ──
  searchEl.addEventListener('input', function () {
    var q = searchEl.value.toLowerCase().trim();
    navEl.querySelectorAll('.ex-nav-item').forEach(function (el) {
      var text = el.textContent.toLowerCase();
      el.classList.toggle('hidden', q.length > 0 && text.indexOf(q) === -1);
    });
    // Hide empty groups
    navEl.querySelectorAll('.ex-nav-group').forEach(function (g) {
      var visible = g.querySelectorAll('.ex-nav-item:not(.hidden)').length;
      g.style.display = visible > 0 ? '' : 'none';
    });
  });

  // ── Source toggle ──
  btnSource.addEventListener('click', function () {
    showSource = !showSource;
    btnSource.classList.toggle('active', showSource);
    contentEl.querySelectorAll('.ex-demo-source').forEach(function (el) {
      el.style.display = showSource ? '' : 'none';
    });
  });

  // ── Hash routing ──
  function onHashChange() {
    var id = location.hash.replace('#', '');
    navigate(id);
  }
  window.addEventListener('hashchange', onHashChange);

  // ── Demo helper: wrap a demo with title + optional source ──
  window.ExplorerDemo = function (container, title, source, renderFn) {
    var wrapper = document.createElement('div');
    wrapper.className = 'ex-demo';
    wrapper.innerHTML =
      '<div class="ex-demo-header"><h3>' + escHtml(title) + '</h3></div>' +
      '<div class="ex-demo-body"></div>' +
      (source ? '<div class="ex-demo-source" style="display:' + (showSource ? '' : 'none') + '"><pre>' + escHtml(source) + '</pre></div>' : '');
    container.appendChild(wrapper);
    var body = wrapper.querySelector('.ex-demo-body');
    renderFn(body);
    return body;
  };

  // ── Boot ──
  // Demos are registered via ExplorerRegistry.add() in separate <script> blocks below.
  // After all scripts load, we build nav and navigate.
  window.addEventListener('DOMContentLoaded', function () {
    buildNav();
    onHashChange();
  });
})();
</script>

<!-- ══════════════════════════════════════════════════════════════
     Demo registrations — each widget category adds its demos here.
     These will be moved to separate files as the explorer grows.
     ══════════════════════════════════════════════════════════════ -->

      ],
      pageSize: 5,
      striped: true
    });

    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  columns: [',
    '    { field: "name", label: "Name", sortable: true },',
    '    { field: "role", label: "Role", sortable: true },',
    '    { field: "revenue", label: "Revenue", sortable: true },',
    '  ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      columns: [
        { field: 'name', label: 'Name', sortable: true },
        { field: 'role', label: 'Role', sortable: true },
        { field: 'department', label: 'Department', sortable: true },
        { field: 'revenue', label: 'Revenue', sortable: true, align: 'right' },

  // 3. Filtering
  ExplorerDemo(container, 'Column Filtering', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  columns: [',
    '    { field: "name", label: "Name", filterable: true },',
    '    { field: "role", label: "Role", filterable: true,',
    '      filterType: "select",',
    '      filterOptions: [{ value: "Admin", label: "Admin" }, ...] },',
    '  ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      columns: [
        { field: 'name', label: 'Name', filterable: true },
        { field: 'role', label: 'Role', filterable: true, filterType: 'select', filterOptions: [
          { value: 'Admin', label: 'Admin' }, { value: 'Editor', label: 'Editor' },
          { value: 'Viewer', label: 'Viewer' }
        ]},
        { field: 'status', label: 'Status', filterable: true },
        { field: 'department', label: 'Department', filterable: true },
      ],
      pageSize: 5
    });
  });

  // 4. Pagination
  ExplorerDemo(container, 'Pagination', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  columns: [ ... ],',
    '  paginated: true,',
    '  pageSize: 10,',
    '  searchable: true',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      columns: [
        { field: 'name', label: 'Name', sortable: true },
        { field: 'email', label: 'Email' },
        { field: 'role', label: 'Role', sortable: true },
        { field: 'status', label: 'Status' },
        { field: 'department', label: 'Department' },
      ],
      paginated: true,
      pageSize: 10,
      searchable: true,
      striped: true
    });
  });

  // 5. Row Grouping
  ExplorerDemo(container, 'Row Grouping', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  columns: [ ... ],',
    '  groupBy: \'department\',',
    '  pageSize: 20',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      columns: [
        { field: 'name', label: 'Name' },
        { field: 'role', label: 'Role' },
        { field: 'department', label: 'Department' },
        { field: 'status', label: 'Status' },
      ],
      groupBy: 'department',
      pageSize: 20
    });
  });

  // 6. Inline Cell Editing
  ExplorerDemo(container, 'Inline Cell Editing', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  editable: true,',
    '  columns: [',
    '    { field: "name", label: "Name", editable: true },',
    '    { field: "revenue", label: "Revenue", editable: true,',
    '      editorType: "number" },',
    '  ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      editable: true,
      columns: [
        { field: 'name', label: 'Name', editable: true },
        { field: 'role', label: 'Role', editable: true },
        { field: 'department', label: 'Department', editable: true },
        { field: 'revenue', label: 'Revenue', editable: true, editorType: 'number', align: 'right' },
      ],
      pageSize: 5,
      striped: true
    });
  });

  // 7. Frozen / Locked Columns
  ExplorerDemo(container, 'Frozen Columns', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  columns: [',
    '    { field: "name", label: "Name", locked: "left" },',
    '    { field: "role", label: "Role" },',
    '    ...',
    '    { field: "status", label: "Status", locked: "right" },',
    '  ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      columns: [

      bordered: true

  // 8. Scrollable Grid
  ExplorerDemo(container, 'Scrollable Grid', [
    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  maxHeight: \'300px\',',
    '  stickyHeader: true,',
    '  columns: [ ... ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      pageSize: 50,
      maxHeight: '300px',
      stickyHeader: true,
      columns: [
        { field: 'name', label: 'Name', sortable: true },
        { field: 'email', label: 'Email' },
        { field: 'role', label: 'Role' },

        { field: 'department', label: 'Department' },

    'Teryx.grid(el, {',
    '  source: \'/api/users\',',
    '  reorderable: true,',
    '  columnReorder: true,',
    '  rowNumbers: true,',
    '  columns: [ ... ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.grid(el, {
      source: '/api/users',
      reorderable: true,
      columnReorder: true,
      rowNumbers: true,
      columns: [
        { field: 'name', label: 'Name' },
        { field: 'role', label: 'Role' },
        { field: 'department', label: 'Department' },
        { field: 'status', label: 'Status' },
      ],
      pageSize: 5
    });
  });

  // 10. Export
  ExplorerDemo(container, 'Export', [
    'var data = [ ... ];',
    'var cols = [{ field: "name", label: "Name" }, ...];',
    'Teryx.exportCSV(data, { columns: cols });',
    'Teryx.exportExcel(data, { columns: cols });',
    'Teryx.exportJSON(data);',
    'Teryx.exportHTML(data, { columns: cols });'
  ].join('\n'), function (el) {
    var exportCols = [
      { field: 'name', label: 'Name' },
      { field: 'role', label: 'Role' },
      { field: 'department', label: 'Department' },
      { field: 'city', label: 'City' },
      { field: 'salary', label: 'Salary' },
    ];
    var formats = ['CSV', 'Excel', 'JSON', 'HTML'];
    var fns = {
      CSV: function () { Teryx.exportCSV(exportData, { columns: exportCols, filename: 'grid-export.csv' }); },
      Excel: function () { Teryx.exportExcel(exportData, { columns: exportCols, filename: 'grid-export.xls' }); },
      JSON: function () { Teryx.exportJSON(exportData, { filename: 'grid-export.json' }); },
      HTML: function () { Teryx.exportHTML(exportData, { columns: exportCols, filename: 'grid-export.html' }); }
    };
    formats.forEach(function (fmt) {

  });
});

// ── Tree ──
ExplorerRegistry.add('Data Display', 'Tree', function (container) {
  // 1. Basic Tree
  ExplorerDemo(container, 'Basic Tree', [
    'Teryx.tree(el, {',
    '  nodes: [',
    '    { id: "1", text: "Documents", children: [',
    '      { id: "1a", text: "Reports", children: [',
    '        { id: "1a1", text: "Q1 Report.pdf" },',
    '      ]},',
    '    ]},',
    '    { id: "2", text: "Images" },',
    '  ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.tree(el, {
      nodes: [
        { id: '1', text: 'Documents', children: [
          { id: '1a', text: 'Reports', children: [
            { id: '1a1', text: 'Q1 Report.pdf' },
            { id: '1a2', text: 'Q2 Report.pdf' },
          ]},
          { id: '1b', text: 'Presentations', children: [
            { id: '1b1', text: 'Kickoff.pptx' },
          ]},
        ]},
        { id: '2', text: 'Images', children: [
          { id: '2a', text: 'photo.jpg' },
          { id: '2b', text: 'logo.png' },
        ]},
        { id: '3', text: 'README.md' },
      ]
    });
  });

  // 2. Checkboxes
  ExplorerDemo(container, 'Checkboxes', [
    'Teryx.tree(el, {',
    '  checkable: true,',
    '  nodes: [',
    '    { id: "p1", text: "Frontend", children: [',

  ].join('\n'), function (el) {
    var statusEl = document.createElement('div');
    statusEl.className = 'tx-tree-check-status';
    statusEl.style.cssText = 'margin-top:0.75rem;padding:0.5rem;background:#f8fafc;border-radius:6px;font-size:0.8125rem;color:#475569;';
    statusEl.textContent = 'Check a node to see the event.';

    Teryx.tree(el, {
      checkable: true,
      nodes: [
        { id: 'p1', text: 'Frontend', children: [
          { id: 'p1a', text: 'React', checked: true },
          { id: 'p1b', text: 'Vue' },
          { id: 'p1c', text: 'Angular' },
        ]},
        { id: 'p2', text: 'Backend', children: [
          { id: 'p2a', text: 'Node.js' },
          { id: 'p2b', text: 'Python', checked: true },
        ]},

    'Teryx.richEditor(el, {',

    '  readonly: true',
    '});'
  ].join('\n'), function (el) {
    Teryx.richEditor(el, {
      value: '<p>This content is <strong>read-only</strong>.</p>',
      readonly: true
    });
  });

  // 4. Get / Set content
  ExplorerDemo(container, 'Get / Set Content', [
    'var editor = Teryx.richEditor(el, {',
    '  value: "<p>Initial content</p>"',
    '});',
    'editor.setValue("<p>Updated via API</p>");',
    'console.log(editor.getValue());'
  ].join('\n'), function (el) {
    var wrap = document.createElement('div');
    el.appendChild(wrap);
    var editor = Teryx.richEditor(wrap, {
      value: '<p>Initial content</p>'
    });

    var btnRow = document.createElement('div');
    btnRow.style.marginTop = '0.75rem';
    btnRow.style.display = 'flex';
    btnRow.style.gap = '0.5rem';

    var setBtn = document.createElement('button');
    setBtn.className = 'tx-btn tx-btn-primary tx-btn-sm';
    setBtn.textContent = 'Set Content';
    setBtn.addEventListener('click', function () {
      editor.setValue('<p>Updated via <strong>API</strong> at ' + new Date().toLocaleTimeString() + '</p>');
    });

    var getBtn = document.createElement('button');
    getBtn.className = 'tx-btn tx-btn-sm';
    getBtn.textContent = 'Get Content';
    getBtn.addEventListener('click', function () {
      alert(editor.getValue());
    });

    btnRow.appendChild(setBtn);
    btnRow.appendChild(getBtn);
    el.appendChild(btnRow);
  });
});

// ── Calendar ──
ExplorerRegistry.add('Specialized', 'Calendar', function (container) {

  // Helper: generate sample events around today
  function sampleEvents() {
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth() + 1).padStart(2, '0');
    function pad(n) { return String(n).padStart(2, '0'); }
    function dt(day) { return y + '-' + m + '-' + pad(day); }
    function dtT(day, h, min) { return dt(day) + 'T' + pad(h) + ':' + pad(min); }
    var d = today.getDate();
    return [
      { id: 'e1', title: 'Team Standup', start: dtT(d, 9, 0), end: dtT(d, 9, 30), color: '#3b82f6' },
      { id: 'e2', title: 'Sprint Planning', start: dtT(d, 10, 0), end: dtT(d, 11, 30), color: '#8b5cf6' },
      { id: 'e3', title: 'Lunch Break', start: dtT(d, 12, 0), end: dtT(d, 13, 0), color: '#22c55e' },
      { id: 'e4', title: 'Design Review', start: dtT(d + 1, 14, 0), end: dtT(d + 1, 15, 0), color: '#f59e0b' },
      { id: 'e5', title: 'Release Day', start: dt(d + 2), allDay: true, color: '#ef4444' },
      { id: 'e6', title: 'Conference', start: dt(d + 3), end: dt(d + 5), allDay: true, color: '#06b6d4' },
      { id: 'e7', title: '1:1 with Manager', start: dtT(d - 1, 16, 0), end: dtT(d - 1, 16, 30), color: '#ec4899' },
    ];
  }

  // 1. Month View
  ExplorerDemo(container, 'Month View', [
    'Teryx.calendar(el, {',
    '  view: "month",',
    '  events: [ ... ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.calendar(el, {
      view: 'month',
      events: sampleEvents(),
    });
  });

  // 2. Week View
  ExplorerDemo(container, 'Week View', [
    'Teryx.calendar(el, {',
    '  view: "week",',
    '  events: [ ... ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.calendar(el, {
      view: 'week',
      events: sampleEvents(),
    });
  });

  // 3. Day View
  ExplorerDemo(container, 'Day View', [
    'Teryx.calendar(el, {',
    '  view: "day",',
    '  events: [ ... ]',
    '});'
  ].join('\n'), function (el) {
    Teryx.calendar(el, {
      view: 'day',
      events: sampleEvents(),
    });
  });

  // 4. Events & Navigation
  ExplorerDemo(container, 'Events & Navigation', [
    'var cal = Teryx.calendar(el, {',
    '  view: "month",',
    '  events: [ ... ],',
    '  onEventClick: function (ev) { alert(ev.title); },',
    '  onDateClick: function (date) { console.log(date); }',
    '});',
    '// cal.next(); cal.prev(); cal.today();',
    '// cal.setView("week"); cal.setDate("2026-04-01");'
  ].join('\n'), function (el) {
    var logBox = document.createElement('div');
    logBox.style.cssText = 'margin-bottom:12px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;font-size:0.8125rem;color:#475569;min-height:32px;';
    logBox.textContent = 'Click an event or date to see the callback log here.';
    el.appendChild(logBox);

    var calEl = document.createElement('div');
    el.appendChild(calEl);

    var cal = Teryx.calendar(calEl, {
      view: 'month',
      events: sampleEvents(),
      onEventClick: function (ev) {
        logBox.textContent = 'Event clicked: ' + ev.title + ' (' + ev.start + ')';
      },
      onDateClick: function (date) {
        logBox.textContent = 'Date clicked: ' + date;
      },
    });

    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;';
    var actions = [
      { label: 'Prev', fn: function () { cal.prev(); } },
      { label: 'Today', fn: function () { cal.today(); } },
      { label: 'Next', fn: function () { cal.next(); } },
    ];
    actions.forEach(function (a) {
      var btn = document.createElement('button');
      btn.className = 'tx-btn tx-btn-sm';
      btn.textContent = a.label;
      btn.onclick = a.fn;
      btnRow.appendChild(btn);
    });
    el.appendChild(btnRow);
  });

  // 5. Remote Events Source
  ExplorerDemo(container, 'Remote Events Source', [
    'Teryx.calendar(el, {',
    '  view: "month",',
    '  source: "/api/calendar/events"',
    '});'
  ].join('\n'), function (el) {
    Teryx.calendar(el, {
      view: 'month',
      source: '/api/calendar/events',

      kb.addCard('ar-todo', { id: 'new-' + counter, title: 'New Task #' + counter });
    });

    var removeBtn = document.createElement('button');
    removeBtn.className = 'tx-btn tx-btn-danger tx-btn-sm';
    removeBtn.textContent = 'Remove First Card';
    removeBtn.addEventListener('click', function () {
      var cols = kb.getColumns();
      var todo = cols.find(function (c) { return c.id === 'ar-todo'; });
      if (todo && todo.items && todo.items.length > 0) {
        kb.removeCard(todo.items[0].id);
      }
    });

    btnRow.appendChild(addBtn);
    btnRow.appendChild(removeBtn);
    el.appendChild(btnRow);
  });
});
</script>

</body>
</html>
