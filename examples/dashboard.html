<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teryx — Dashboard Demo</title>
  <link rel="stylesheet" href="/teryx.css">
  <style>
    body { margin: 0; font-family: var(--tx-font); background: var(--tx-bg-secondary); color: var(--tx-text); }
    .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .dashboard-content { padding: 1.5rem; }
  </style>
</head>
<body>
  <div class="tx-layout-sidebar">

    <!-- Sidebar -->
    <div id="app-sidebar"></div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <!-- Navbar -->
      <div id="app-navbar"></div>

      <!-- Main Content -->
      <main class="dashboard-content" style="flex:1; overflow:auto;">

        <!-- Breadcrumb -->
        <nav class="tx-breadcrumb">
          <span class="tx-breadcrumb-item"><a href="/">Home</a></span>
          <span class="tx-breadcrumb-item tx-breadcrumb-active">Dashboard</span>
        </nav>

        <h1 style="margin:0 0 1.5rem; font-size:1.5rem;">Dashboard</h1>

        <!-- Stats Row -->
        <div class="dashboard-stats">
          <div id="stat-users"></div>
          <div id="stat-revenue"></div>
          <div id="stat-orders"></div>
          <div id="stat-active"></div>
        </div>

        <!-- Grid / Table -->
        <div id="users-grid" style="margin-bottom:1.5rem;"></div>

        <!-- Bottom Row -->
        <div class="tx-row">
          <div class="tx-col-6">
            <div id="recent-activity"></div>
          </div>
          <div class="tx-col-6">
            <div id="file-tree"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Toast container will be auto-created -->

  <script src="/xhtmlx.js"></script>
  <script src="/teryx.js"></script>
  <script>
    // ── Sidebar ──
    Teryx.sidebar('#app-sidebar', {
      brand: 'Teryx',
      brandHref: '/',
      variant: 'dark',
      collapsible: true,
      items: [
        { section: true, label: 'Main' },
        { label: 'Dashboard', href: '/dashboard.html', icon: 'home', active: true },
        { label: 'Users', href: '#', icon: 'user', badge: '87' },
        { label: 'Files', href: '#', icon: 'folder' },
        { section: true, label: 'Settings' },
        { label: 'General', href: '#', icon: 'settings' },
        { label: 'Security', href: '#', icon: 'eye', children: [
          { label: 'Permissions', href: '#' },
          { label: 'Audit Log', href: '#' },
        ]},
      ],
    });

    // ── Navbar ──
    Teryx.navbar('#app-navbar', {
      items: [],
      endItems: [
        { label: 'Help', href: '#', icon: 'info' },
        { label: 'Admin', href: '#', icon: 'user' },
      ],
      variant: 'light',
    });

    // ── Stats ──
    Teryx.stat('#stat-users', {
      label: 'Total Users', value: '1,234', icon: 'user', color: 'primary',
      change: '+12.5%', changeType: 'up',
      sparkline: [30, 40, 35, 50, 49, 60, 70, 65, 80, 75, 90, 100],
    });
    Teryx.stat('#stat-revenue', {
      label: 'Revenue', value: '$56,789', icon: 'home', color: 'success',
      change: '+8.2%', changeType: 'up', prefix: '',
      sparkline: [20, 35, 30, 45, 40, 55, 50, 65, 60, 70, 75, 80],
    });
    Teryx.stat('#stat-orders', {
      label: 'Orders', value: '423', icon: 'file', color: 'warning',
      change: '-3.1%', changeType: 'down',
    });
    Teryx.stat('#stat-active', {
      label: 'Active Now', value: '42', icon: 'eye', color: 'info',
      change: '0%', changeType: 'neutral',
    });

    // ── Users Grid ──
    Teryx.grid('#users-grid', {
      source: '/api/users',
      searchable: true,
      paginated: true,
      hoverable: true,
      striped: true,
      toolbar: [
        { type: 'button', label: 'Add User', icon: 'plus', variant: 'primary',
          action: '#', tooltip: 'Create a new user' },
        { type: 'separator' },
        { type: 'button', label: 'Export', icon: 'download', variant: 'outline-secondary' },
      ],
      columns: [
        { field: 'id', label: 'ID', width: '60px', sortable: true },
        { field: 'name', label: 'Name', sortable: true },
        { field: 'email', label: 'Email', sortable: true },
        { field: 'role', label: 'Role', sortable: true, renderer: 'badge' },
        { field: 'status', label: 'Status', sortable: true, renderer: 'badge' },
        { field: 'joined', label: 'Joined', sortable: true, renderer: 'date' },
      ],
    });

    // ── Timeline / Activity ──
    Teryx.card('#recent-activity', {
      title: 'Recent Activity',
    });
    // Inject timeline into card body after it renders
    setTimeout(() => {
      const body = document.querySelector('#recent-activity .tx-card-body');
      if (body) {
        Teryx.timeline(body, {
          items: [
            { title: 'New user registered', content: 'alice@example.com', time: '2 min ago', status: 'completed', color: 'success' },
            { title: 'Payment received', content: '$1,200 from Bob Smith', time: '15 min ago', status: 'completed', color: 'info' },
            { title: 'Server alert', content: 'CPU usage at 90%', time: '1 hr ago', status: 'active', color: 'warning' },
            { title: 'Build deployed', content: 'v2.4.1 to production', time: '3 hrs ago', status: 'completed' },
          ],
        });
      }
    }, 0);

    // ── File Tree ──
    Teryx.card('#file-tree', { title: 'Project Files' });
    setTimeout(() => {
      const body = document.querySelector('#file-tree .tx-card-body');
      if (body) {
        Teryx.tree(body, {
          nodes: [
            { id: '1', text: 'src', icon: 'folder', children: [
              { id: '1-1', text: 'components', icon: 'folder', children: [
                { id: '1-1-1', text: 'App.tsx', leaf: true },
                { id: '1-1-2', text: 'Header.tsx', leaf: true },
                { id: '1-1-3', text: 'Sidebar.tsx', leaf: true },
              ]},
              { id: '1-2', text: 'utils', icon: 'folder', children: [
                { id: '1-2-1', text: 'api.ts', leaf: true },
                { id: '1-2-2', text: 'helpers.ts', leaf: true },
              ]},
              { id: '1-3', text: 'index.ts', leaf: true },
            ], expanded: true },
            { id: '2', text: 'public', icon: 'folder', children: [
              { id: '2-1', text: 'index.html', leaf: true },
              { id: '2-2', text: 'favicon.ico', leaf: true },
            ]},
            { id: '3', text: 'package.json', leaf: true },
            { id: '4', text: 'tsconfig.json', leaf: true },
          ],
          selectable: true,
          lines: true,
        });
      }
    }, 0);

    // ── Show a welcome toast ──
    setTimeout(() => {
      Teryx.toast.success('Dashboard loaded successfully', { title: 'Welcome!' });
    }, 500);
  </script>
</body>
</html>
